CONFIG_ZMK_KEYBOARD_NAME="KobitoKey"

# ZMK Official Pointing Configuration (PMW3610)
CONFIG_INPUT_PMW3610=y
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_BLE=y
# ❌ CONFIG_ZMK_MOUSE=y は競合・フリーズの原因になるため削除！

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_SENSOR_ROTATION=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_INTERVAL_MS=1000

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=60
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=1
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=5

# Prospector Scanner (V2.1.0+) Status Advertisement Settings
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="KobitoKey"
CONFIG_ZMK_STATUS_ADV_ACTIVITY_BASED=y
CONFIG_ZMK_STATUS_ADV_ACTIVE_INTERVAL_MS=100
CONFIG_ZMK_STATUS_ADV_IDLE_INTERVAL_MS=30000
CONFIG_ZMK_STATUS_ADV_CENTRAL_SIDE="LEFT"

# ▼▼▼ 接続安定化設定 ▼▼▼
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ▼▼▼ トラックボール・通信のレスポンス向上（遅延削減） ▼▼▼
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# ▼▼▼ 激しいマウス操作時のフリーズ（メモリあふれ）対策 ▼▼▼
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_BT_BUF_ACL_TX_COUNT=7
CONFIG_BT_BUF_ACL_TX_SIZE=251

# 💡 1. インプット処理（キーやセンサー）のメモリ容量を通常の4倍に拡大し、処理の遅延を完全に防ぐ
CONFIG_INPUT_THREAD_STACK_SIZE=4096

# 💡 2. SPI通信を「非同期」から「同期」モードへ。割り込みの衝突を禁止し、タイピング中のバッファ詰まりを力技で解消する
CONFIG_SPI_ASYNC=n
