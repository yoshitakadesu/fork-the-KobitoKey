CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_MOUSE=y

CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_PMW3610_ALT=y

# CONFIG_PMW3610=y
# CONFIG_PMW3610_INVERT_X=n
# CONFIG_PMW3610_SMART_ALGORITHM=y
# CONFIG_PMW3610_REPORT_INTERVAL_MIN=12

CONFIG_ZMK_BATTERY_REPORTING=y

# ▼▼▼ これだけは残す（通信安定化） ▼▼▼
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 接続パラメータの交渉を改善する（実験的機能ですが、接続維持に効果大）
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ▼▼▼ LEDと充電表示の設定 ▼▼▼
CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_INTERVAL_MS=1000
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=60
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

# ▼▼▼ LEDの明るさ設定 (0〜100) ▼▼▼
# 左側に合わせるなら同じ数値にしますが、
# USB給電時(右)はバッテリー駆動時(左)より電圧が高く明るくなりがちなので、
# 少し低め（例: 40〜80）に設定して目視で合わせるのがおすすめです。

CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# ▼▼▼ トラックボール・通信のレスポンス向上（遅延削減） ▼▼▼
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# ▼▼▼ 激しいマウス操作時のフリーズ（メモリあふれ）対策 ▼▼▼
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_BT_BUF_ACL_TX_COUNT=7
CONFIG_BT_BUF_ACL_TX_SIZE=251

# ▼▼▼ マウスの「ワンテンポ遅れる」ラグを解消する ▼▼▼
# 1. センサーが起きっぱなしでいる時間を、限界（約3.2秒）まで延ばす
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264

# 2. 浅いスリープ中の「起きてる？」の確認頻度を最速にして、目覚めを良くする
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=10

# ▼▼▼ センサーからのデータ送信間隔を制限し、ハングアップを完全に防ぐ ▼▼▼
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12
